version: "3.9"

services:

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: gs_postgres
    environment:
      POSTGRES_USER: shipyard
      POSTGRES_PASSWORD: galactic
      POSTGRES_DB: galactic_shipyard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipyard -d galactic_shipyard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gs_network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: gs_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gs_network

  # ── FastAPI Backend ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gs_api
    environment:
      DATABASE_URL: postgresql+asyncpg://shipyard:galactic@postgres:5432/galactic_shipyard
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-please}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    networks:
      - gs_network
    restart: unless-stopped

  # ── Nginx ──
  nginx:
    image: nginx:1.25-alpine
    container_name: gs_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/var/www/frontend:ro
    depends_on:
      - api
    networks:
      - gs_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gs_network:
    driver: bridge
